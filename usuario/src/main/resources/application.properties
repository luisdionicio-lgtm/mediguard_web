spring.application.name=usuario

# Puerto del backend Spring Boot usuario
server.port=8081

# PostgreSQL configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT configuration
# Set JWT_SECRET outside source control. It must be at least 32 characters long.
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.access-token-seconds=${JWT_ACCESS_TOKEN_SECONDS:3600}
app.security.jwt.refresh-token-seconds=${JWT_REFRESH_TOKEN_SECONDS:604800}

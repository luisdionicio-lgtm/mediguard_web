spring.application.name=usuario

# Puerto del backend Spring Boot usuario
server.port=8081

# PostgreSQL compartido con Django
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mediguard_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Django administra el esquema. Spring Boot NO modifica tablas.
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
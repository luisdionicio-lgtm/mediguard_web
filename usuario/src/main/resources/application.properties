spring.application.name=usuario

# Puerto del backend Spring Boot usuario
server.port=8081

# PostgreSQL configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/mediguard_web
spring.datasource.username=postgres
spring.datasource.password=AdminPostgres_2026
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT configuration
# JWT_SECRET debe ser IDENTICO al JWT_SECRET del backend Django para validar tokens compartidos.
# Minimo 32 caracteres. Configura via variable de entorno, nunca en codigo fuente.
app.security.jwt.secret=${JWT_SECRET:test-only-jwt-secret-with-at-least-32-characters}
app.security.jwt.access-token-seconds=${JWT_ACCESS_TOKEN_SECONDS:3600}
app.security.jwt.refresh-token-seconds=${JWT_REFRESH_TOKEN_SECONDS:604800}


# GMAIL configuration
spring.security.oauth2.client.registration.google.client-id=TU_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=TU_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile
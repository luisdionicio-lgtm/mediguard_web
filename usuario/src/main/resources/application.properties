spring.application.name=usuario

# Puerto del backend Spring Boot usuario
server.port=8081

# PostgreSQL configuration
# PostgreSQL configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/mediguard_web
spring.datasource.username=postgres
spring.datasource.password=AdminPostgres_2026    
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT configuration
# Set JWT_SECRET outside source control. It must be at least 32 characters long.
app.security.jwt.secret=${JWT_SECRET:test-only-jwt-secret-with-at-least-32-characters}
app.security.jwt.access-token-seconds=${JWT_ACCESS_TOKEN_SECONDS:3600}
app.security.jwt.refresh-token-seconds=${JWT_REFRESH_TOKEN_SECONDS:604800}

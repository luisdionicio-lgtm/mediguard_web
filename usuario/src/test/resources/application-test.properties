spring.application.name=usuario

spring.datasource.url=jdbc:h2:mem:mediguard_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE DOMAIN IF NOT EXISTS token_type_enum AS VARCHAR(50)
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

app.security.jwt.secret=test-only-jwt-secret-with-at-least-32-characters
app.security.jwt.access-token-seconds=3600
app.security.jwt.refresh-token-seconds=604800

# No hay servidor SMTP real en test; el envío falla y PasswordResetMailService lo atrapa.
spring.mail.host=localhost
spring.mail.port=2525
app.frontend.reset-password-url=http://localhost:5173/reset-password
